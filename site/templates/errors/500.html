<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — WireCommerce</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #0a0a0a;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
        }
        header a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.125rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
        }
        .code {
            font-size: 7rem;
            font-weight: 700;
            line-height: 1;
            color: #e0e0e0;
            letter-spacing: -0.04em;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.125rem;
            color: #666666;
            max-width: 420px;
            margin-bottom: 32px;
        }
        a.btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 32px;
            background: #e63329;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 150ms ease;
        }
        a.btn:hover { background: #c42820; }
        footer {
            background: #111111;
            color: rgba(255,255,255,0.35);
            text-align: center;
            padding: 20px 24px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">WireCommerce</a>
    </header>
    <main>
        <p class="code">500</p>
        <h1>Something Went Wrong</h1>
        <p>We encountered an unexpected error. Please try again or return home.{message}</p>
        <a href="/" class="btn">Back to Home</a>
    </main>
    <footer>
        <small>&copy; WireCommerce. All rights reserved.</small>
    </footer>
</body>
</html>
